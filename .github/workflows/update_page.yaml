name: Update Page

on:
  schedule:
    # 17:35 UTC == 1:35pm EDT (UTC-4)
    - cron: "40 17 * * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write # needed to commit the updated index.html

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run test_change.py
        run: python3 test_change.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- index.html; then
            echo "No changes to index.html"
          else
            git add index.html
            git commit -m "Update index.html with latest API data"
            git push
          fi
